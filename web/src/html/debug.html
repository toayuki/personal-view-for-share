    /* ============================================================
       style.css
    ============================================================ */
    body {
      font: 14px/2 "Open sans", sans-serif;
      letter-spacing: 0.05em;
      background-image: var(--bg-body);
    }
    #loading { transition: all 1s; position: fixed; inset: 0; z-index: 9999; background-image: var(--bg-loading); }
    .loaded { opacity: 0; visibility: hidden; }

    header h1, header h2 {
      margin-top: 0; padding-top: 0; font-size: 13px;
      position: fixed; top: 0; padding-left: 10px;
      color: var(--color-header-h1); z-index: 100; font-weight: normal;
    }
    header h2 { padding-right: 60px; font-size: 11px; top: 38px; }

    body.sub_page { width: 100%; min-height: 100vh; background: transparent; position: relative; }

    #bg-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--screen-height, 100lvh);
      z-index: -1;
      background-color: var(--bg-sub-page);
      background-size: cover; background-position: center;
    }

    header {
      width: 100%; height: 100px; position: fixed; z-index: 300;
      transition: all 0.3s ease; top: 0;
    }
    header.fixed { background: var(--bg-header-fixed); }

    body.sub_page main { padding-top: 80px; min-height: calc(100vh - 100px); box-sizing: border-box; }

    .bg_bl {
      background-color: var(--bg-menu-block);
      height: 100%; width: 100%; opacity: 0.75;
      display: block; position: fixed; z-index: 2000;
    }
    .menu_btn {
      display: block; height: 60px; width: 60px; text-align: center;
      position: fixed; z-index: 5000; top: 5px; right: 5px; cursor: pointer;
    }
    .menu_btn span {
      width: 40px; height: 2px; display: block; position: absolute;
      left: 50%; top: 50%; margin-left: -20px;
      background-color: var(--color-hamburger);
      transition: all 0.3s; transform: rotate(0deg);
    }
    .menu_btn span.top    { transform: translateY(-12px); }
    .menu_btn span.bottom { transform: translateY(12px); }
    .menu_btn.opened span.middle { background: transparent !important; transform: translateX(30px); }
    .menu_btn.opened span.top    { transform: rotate(-45deg) translateY(0px); }
    .menu_btn.opened span.bottom { transform: rotate(45deg) translateY(0px); }

    #g_navi {
      position: fixed; width: 100%; height: 100%; top: 0; overflow: auto;
      z-index: 3000; background-color: var(--bg-nav); display: none; padding-left: 5%;
    }
    #g_navi ul {
      display: flex; flex-flow: column; justify-content: center;
      min-height: 100%; list-style: none;
    }
    #g_navi ul li { opacity: 0; }
    #g_navi.nav-open ul li { animation: menuItemSlideIn 0.25s both; animation-delay: var(--item-delay, 0s); }
    #g_navi.nav-close ul li { animation: menuItemSlideOut 0.25s both; animation-delay: var(--item-delay, 0s); }
    @keyframes menuItemSlideIn {
      from { opacity: 0; transform: translateX(var(--slide-from, -40px)); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes menuItemSlideOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(var(--slide-from, -40px)); }
    }
    #g_navi ul li a {
      color: var(--color-nav-link); text-decoration: none; display: inline-block;
      line-height: 2; font-size: 3vw; letter-spacing: 0.2em; position: relative;
      margin: 10px 0; font-family: "Oswald", sans-serif; text-transform: uppercase; font-weight: 100;
    }
    #g_navi ul li.sml a { font-size: 2.5vw; color: var(--color-nav-link-sm); }

    footer.fixed {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: var(--bg-footer-fixed); z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }
    body.sub_page footer, body.sub_page footer.fixed { background: transparent; }
    footer {
      margin: 0; background: var(--bg-footer); color: var(--color-footer);
      padding: 10px; min-height: 100px; box-sizing: border-box;
    }

    @media screen and (max-width: 640px) {
      #g_navi ul li a   { font-size: 7vw; }
      #g_navi ul li.sml a { font-size: 6vw; }
    }
    @media screen and (min-width: 1200px) {
