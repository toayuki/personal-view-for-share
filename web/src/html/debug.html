/**
  *デバッグ用のページです。他ファイルの継承をしないようにしてください。
  *テーマ切り替えの動作確認や、背景画像の表示確認などに使用します。
  *テーマ切り替えは、右上のボタンをクリック
  */

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"> -->
  <title>Debug</title>
  <style>
    :root                { --bg: #000305; --fg: #ccc; --border: #333; }
    [data-theme="light"] { --bg: #f5f5f5; --fg: #334; --border: #ccc; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg); }

    #bg-fixed {
      position: fixed; top: 0; left: 0;
      width: 100%; height: var(--screen-height, 100lvh);
      z-index: -1; background-size: cover; background-position: center;
    }

    .page-content { padding: 80px 24px 24px; }
    .section {
      height: 100vh; display: flex;
      align-items: center; justify-content: center;
      font-size: 18px; border-bottom: 1px solid var(--border);
    }
    #theme-toggle-debug {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      padding: 4px 10px; font-size: 13px; cursor: pointer;
      background: rgba(128,128,128,0.3); border: 1px solid #888; border-radius: 4px;
      color: var(--fg);
    }
  </style>
</head>
<body>

  <header>
    <h1>Debug Page</h1>
  </header>
  <button id="theme-toggle-debug" onclick="const h=document.documentElement;h.dataset.theme=h.dataset.theme==='light'?'dark':'light';this.textContent=h.dataset.theme==='light'?'🌙 Dark':'☀️ Light'">☀️ Light</button>

  <div id="bg-fixed" style="background-image: url('{{ debug_bg }}');"></div>

  <div class="page-content">
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 2" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 2" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 3" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
  </div>

  <script>
    const screenH = window.screen.height + 'px';
    document.documentElement.style.setProperty('--screen-height', screenH);

    // window.addEventListener('load', function() {
    //   const bg = document.getElementById('bg-fixed');
    //   if (bg) bg.style.transform = 'translateY(-100px)';
    // });
  </script>
</body>
</html>
