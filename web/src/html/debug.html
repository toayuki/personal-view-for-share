<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    #bg-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--screen-height, 100lvh);
      z-index: -1;
      background-size: cover;
      background-position: center;
    }

    .page-content { padding: 80px 24px 24px; }
    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

  <div id="bg-fixed" style="background-image: url('{{ debug_bg }}');"></div>

  <div class="page-content">
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 2" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 2" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
    <div class="section">
      <img src="{{ debug_image }}" alt="debug 3" style="max-width:100%;max-height:100%;object-fit:contain;">
    </div>
  </div>

  <script>
    const screenH = window.screen.height + 'px';
    document.documentElement.style.setProperty('--screen-height', screenH);

    // window.addEventListener('load', function() {
    //   const bg = document.getElementById('bg-fixed');
    //   if (bg) bg.style.transform = 'translateY(-100px)';
    // });
  </script>
</body>
</html>
