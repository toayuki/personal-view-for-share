<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PERSONAL WEB - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans%3A400%2C400italic%2C600%2C700%7COswald%3A400%2C300">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Open Sans", sans-serif;
      letter-spacing: 0.05em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle farthest-corner at center, #223538 0%, #000305 100%);
      color: #ccc;
    }

    .login-box {
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .login-title {
      font-family: "Oswald", sans-serif;
      font-size: 13px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #eee;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #67ABCD;
    }

    input[type="text"],
    input[type="password"] {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(103, 171, 205, 0.3);
      color: #eee;
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      padding: 6px 0;
      outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-bottom-color: #67ABCD;
    }

    .error-msg {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #cd6767;
      text-align: center;
    }

    button[type="submit"] {
      margin-top: 8px;
      background: transparent;
      border: 1px solid rgba(103, 171, 205, 0.4);
      color: #67ABCD;
      font-family: "Open Sans", sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      width: 100%;
    }

    button[type="submit"]:hover {
      background: rgba(103, 171, 205, 0.08);
      border-color: #67ABCD;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(103, 171, 205, 0.25);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <p class="login-title">Personal Web</p>
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      {% if error %}
      <p class="error-msg">Invalid credentials</p>
      {% endif %}
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
