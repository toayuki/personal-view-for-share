<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PERSONAL WEB - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans%3A400%2C400italic%2C600%2C700%7COswald%3A400%2C300">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <script>
    // ページ描画前にテーマを適用してフラッシュを防ぐ
    (function() {
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="login-box">
    <p class="login-title">Personal Web</p>
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" autocomplete="username email" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      {% if error %}
      <p class="error-msg">Invalid credentials</p>
      {% endif %}
      <button type="submit">Enter</button>
    </form>
    <a href="/signup" class="sub-link">新規会員登録</a>
  </div>
  <button id="theme-toggle" title="テーマ切り替え"></button>
  <script>
    (function() {
      const btn = document.getElementById('theme-toggle');
      // data-theme は <head> スクリプト済みなのでボタン表示のみ同期
      btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '🌙';
      btn.addEventListener('click', function() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        btn.textContent = t === 'dark' ? '☀' : '🌙';
        localStorage.setItem('theme', t);
      });
    })();
  </script>
</body>
</html>
