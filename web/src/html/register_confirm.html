<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PERSONAL WEB - Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans%3A400%2C400italic%2C600%2C700%7COswald%3A400%2C300">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Open Sans", sans-serif;
      letter-spacing: 0.05em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle farthest-corner at center, #223538 0%, #000305 100%);
      color: #ccc;
    }

    .box {
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .title {
      font-family: "Oswald", sans-serif;
      font-size: 13px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #eee;
    }

    .message {
      font-size: 11px;
      letter-spacing: 0.15em;
      line-height: 2;
      color: #777;
    }

    .email {
      color: #67ABCD;
    }

    .error-msg {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #cd6767;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(103, 171, 205, 0.25);
    }

    .sub-link {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      transition: color 0.3s;
    }

    .sub-link:hover { color: #67ABCD; }
  </style>
</head>
<body>
  <div class="box">
    <div class="divider"></div>
    {% if invalid %}
    <p class="title">Invalid Link</p>
    <p class="message error-msg">リンクが無効または期限切れです</p>
    <a href="/register" class="sub-link">再送信する</a>
    {% else %}
    <p class="title">Confirmed</p>
    <p class="message">
      <span class="email">{{ email }}</span><br>
      の登録が完了しました
    </p>
    <a href="/login" class="sub-link">ログインへ</a>
    {% endif %}
    <div class="divider"></div>
  </div>
</body>
</html>
