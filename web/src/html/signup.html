<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PERSONAL WEB - signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans%3A400%2C400italic%2C600%2C700%7COswald%3A400%2C300">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Open Sans", sans-serif;
      letter-spacing: 0.05em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle farthest-corner at center, #223538 0%, #000305 100%);
      color: #ccc;
    }

    .box {
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .title {
      font-family: "Oswald", sans-serif;
      font-size: 13px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #eee;
    }

    .description {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #67ABCD;
    }

    input[type="email"] {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(103, 171, 205, 0.3);
      color: #eee;
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      padding: 6px 0;
      outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }

    input[type="email"]:focus {
      border-bottom-color: #67ABCD;
    }

    .success-msg {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #67ABCD;
      text-align: center;
    }

    .error-msg {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #cd6767;
      text-align: center;
    }

    button[type="submit"] {
      margin-top: 8px;
      background: transparent;
      border: 1px solid rgba(103, 171, 205, 0.4);
      color: #67ABCD;
      font-family: "Open Sans", sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      width: 100%;
    }

    button[type="submit"]:hover {
      background: rgba(103, 171, 205, 0.08);
      border-color: #67ABCD;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(103, 171, 205, 0.25);
    }

    .sub-link {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      transition: color 0.3s;
    }

    .sub-link:hover {
      color: #67ABCD;
    }
  </style>
</head>
<body>
  <div class="box">
    <p class="title">signup</p>
    <p class="description">メールアドレスを送信してください</p>
    <form id="signupForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" autofocus>
      </div>
      <p id="successMsg" class="success-msg" style="display:none">送信しました</p>
      <p id="errorMsg" class="error-msg" style="display:none">送信に失敗しました</p>
      <button type="submit">Send</button>
    </form>
    <script>
      document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        document.getElementById("successMsg").style.display = "none";
        document.getElementById("errorMsg").style.display = "none";
        try {
          const res = await fetch("/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          if (res.ok) {
            document.getElementById("successMsg").style.display = "block";
          } else {
            document.getElementById("errorMsg").style.display = "block";
          }
        } catch {
          document.getElementById("errorMsg").style.display = "block";
        }
      });
    </script>
    <a href="/login" class="sub-link">ログインに戻る</a>
  </div>
</body>
</html>
