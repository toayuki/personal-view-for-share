[tool.ruff]
target-version = "py39"
line-length = 100
src = ["web/src", "api/src", "api"]
include = ["web/src/**/*.py", "api/**/*.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
